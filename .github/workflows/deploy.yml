name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # GitHub Pages is configured to serve branch main at /. Publish the Vite
      # build at repo root (index.html + assets/), not the dev entry /src/main.tsx.
      - name: Publish static build to repository root
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/favicon.svg favicon.svg
          touch .nojekyll

      - name: Commit static site for branch-based Pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: publish static site for GitHub Pages [skip ci]"
          file_pattern: index.html assets favicon.svg .nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
